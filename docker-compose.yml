
services:
  # 1. Zookeeper (Kafka的强依赖)
  zookeeper:
    image: zookeeper:3.4
    container_name: rec-zookeeper
    ports:
      - "2181:2181"
    networks:
      - rec-network

  # 2. Kafka (消息缓冲服务)
  kafka:
    image: wurstmeister/kafka:0.10.2.1
    container_name: rec-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - rec-network

  # 3. ElasticSearch (搜索服务器)
  elasticsearch:
    image: elasticsearch:5.6.16
    container_name: rec-elasticsearch
    environment:
      - "node.name=es-node"
      - "network.host=0.0.0.0"
      - "transport.publish_host=127.0.0.1"
      - "discovery.type=single-node"
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "xpack.security.enabled=false"
    ports:
      - "9200:9200" 
      - "9300:9300" # Spark TCP 通信端口
    networks:
      - rec-network

  # 4. MongoDB (业务数据库)
  mongodb:
    image: mongo:4.0
    container_name: rec-mongodb
    ports:
      - "27017:27017"
    networks:
      - rec-network

  # 5. Redis (缓存数据库)
  redis:
    image: redis:4.0
    container_name: rec-redis
    ports:
      - "6379:6379"
    networks:
      - rec-network

networks:
  rec-network:
    driver: bridge
